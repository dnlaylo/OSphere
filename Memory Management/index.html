  <body>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css" />
    <div>
      <link href="./index.css" rel="stylesheet" />
  
      <div class="algorithm-container1">
        <div class="algorithm-thq-algorithm-elm">
          
          <div class="algorithm-thq-bg-elm">
            <img src="Assets/BG/Black BG.svg" alt="Solid black background" class="algorithm-thq-mainpageblackbg-elm" />
            <img src="Assets/BG/Dots.svg" alt="Dotted background pattern overlay" class="algorithm-thq-assets13-elm" />
          </div>
  
          <main class="algorithm-thq-content-container-elm">
            
            <img src="Assets/Input Container.svg" alt="Translucent background container for calculator inputs" class="algorithm-thq-input-container-elm" />
  
            <div class="algorithm-thq-dropdown-elm">
              <img src="Assets/dropdown_con.svg" alt="Dropdown selection background" class="algorithm-thq-dropdowncon-elm" />
              <span class="algorithm-thq-text-elm6">Algorithms</span>
              <img src="Assets/dropdown_icon.svg" alt="Expand dropdown icon" class="algorithm-thq-dropdownicon-elm" />
            </div>
  
            <div class="algorithm-thq-arrival-time-elm">
              <span class="algorithm-thq-text-elm5">Arrival Time</span>
              <img src="Assets/Line 7.svg" alt="Decorative underline for arrival time" class="algorithm-thq-line7-elm" />
              <img src="Assets/Arrival Time Input.svg" alt="Arrival time input field" class="algorithm-thq-arrival-time-input-elm" />
            </div>
  
            <div class="algorithm-thq-burst-time-elm1">
              <span class="algorithm-thq-text-elm4">Burst Time</span>
              <div class="algorithm-thq-burst-time-elm2">
                <img src="Assets/Line 8.svg" alt="Decorative underline for burst time" class="algorithm-thq-line8-elm" />
                <img src="Assets/Burst Time Input.svg" alt="Burst time input field" class="algorithm-thq-burst-time-input-elm" />
              </div>
            </div>
  
            <div class="algorithm-thq-time-quantum-elm">
              <div class="algorithm-thq-group22-elm">
                <span class="algorithm-thq-text-elm3">Time Quantum</span>
                <img src="Assets/Line 9.svg" alt="Decorative underline for time quantum" class="algorithm-thq-line9-elm" />
              </div>
              <div class="algorithm-thq-tqaddbtn-elm">
                <img src="Assets/tq_add_btn.svg" alt="Add time quantum value button" class="algorithm-thq-addicon-elm1" />
              </div>
            </div>
  
            <div class="algorithm-thq-at-btaddbtn-elm">
              <img src="Assets/at-bt_add_btn.svg" alt="Add new process row background" class="algorithm-thq-btncon-elm" />
              <img src="public/addicon3435-cd1-200h.png" alt="Plus icon to add process row" class="algorithm-thq-addicon-elm2" />
            </div>
  
            <div class="algorithm-thq-compute-button-elm">
              <img src="Assets/compute_btn_con.svg" alt="Compute results button background" class="algorithm-thq-computebtncon-elm" />
              <span class="algorithm-thq-text-elm2">COMPUTE</span>
            </div>
  
            <span class="algorithm-thq-text-elm1">Please input contents</span>
  
          </main>
  
          <nav class="algorithm-thq-navigation-bar-elm">
            <img src="Assets/NavBar/Side Menu.png" alt="Open side menu" class="algorithm-thq-side-menu-elm" />
            <img src="Assets/NavBar/Line 1.svg" alt="Navigation separator line" class="algorithm-thq-line1-elm" />
            <a href="../Main Page/index.html">
              <img src="Assets/NavBar/Home (1).png" alt="Navigate to Home Page" class="algorithm-thq-home-elm" />
            </a>
            <a href="../About Us/index.html">
              <img src="Assets/NavBar/Help.png" alt="Navigate to Help Page" class="algorithm-thq-help-elm" />
            </a>
          </nav>
          <div id="popup-overlay">
            <div class="output-container1">
              <div class="output-thq-output-elm">
                <img src="Assets/Diagram.svg" alt="Table2114" class="output-thq-table-elm" />
                <span class="output-thq-text-elm3">MEMORY MANAGEMENT</span>
                <img src="Assets/line.svg" alt="line2114" class="output-thq-line-elm" />
                <span class="output-thq-text-elm4">OUTPUT</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

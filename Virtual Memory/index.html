<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OSphere</title> 
    <meta property="og:title" content="OSphere" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />

    <style data-tag="default-style-sheet">
      html { font-family: Inter; font-size: 16px; }
      body { font-weight: 400; font-style:normal; text-decoration: none; text-transform: none; letter-spacing: normal; line-height: 1.15; color: var(--dl-color-theme-neutral-dark); background: var(--dl-color-theme-neutral-light); fill: var(--dl-color-theme-neutral-dark); }

    <link rel="stylesheet" href="https://unpkg.com/animate.css@4.1.1/animate.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" data-tag="font" />
    
    <link href="./index.css" rel="stylesheet" />
  </head>
  <body>
    <script src="script.js" defer></script>
    
    <div>
      <div class="algorithm-container1">
        <div class="algorithm-thq-algorithm-elm">
          
          <div class="algorithm-thq-bg-elm">
            <img src="Assets/BG/Black BG.svg" alt="Solid black background" class="algorithm-thq-mainpageblackbg-elm" />
            <img src="Assets/BG/Dots.svg" alt="Dotted background pattern overlay" class="algorithm-thq-assets13-elm" />
          </div>

          <main class="algorithm-thq-content-container-elm" style="width:100%;height:auto;top:120px;left:0;justify-content:center;z-index:10;">
          <div class="main-container">
              <div class="top-controls">          
                  <select id="algorithm">
                      <option disabled selected>ALGORITHM</option>
                      <option value="FIFO">FIFO</option>
                      <option value="LRU">LRU</option>
                      <option value="OPTIMAL">OPTIMAL</option>
                  </select>          
              </div>

              <div class="vm-fields">
                  <div class="vm-group">
                      <label>Reference String</label>
                      <input
                          id="reference"
                          type="text"
                          placeholder="Ex: 1 2 3 4 4 5 6 7"
                      >
                  </div>
          
                  <div class="vm-group small">
                      <label>No. of Frames</label>
                      <input
                          id="frames"
                          type="number"
                          min="1"
                          placeholder="3"
                      >
                  </div>
              </div>
          
              <button id="compute">COMPUTE</button>
          </div>
          </main>

          <nav class="algorithm-thq-navigation-bar-elm" style="z-index: 20;">
            <img src="Assets/NavBar/Side Menu.png" alt="Open side menu" class="algorithm-thq-side-menu-elm" />
            <img src="Assets/NavBar/Line 1.svg" alt="Navigation separator line" class="algorithm-thq-line1-elm" />
            <a href="../Main Page/index.html">
              <img src="Assets/NavBar/Home (1).png" alt="Navigate to Home Page" class="algorithm-thq-home-elm" />
            </a>
            <a href="../About Us/index.html">
              <img src="Assets/NavBar/Help.png" alt="Navigate to Help Page" class="algorithm-thq-help-elm" />
            </a>
          </nav>

          <div id="popup-overlay">
            <div class="modal-card">
              <div class="modal-header">
                <span>OUTPUT</span>
              </div>
              <div class="modal-body">
                <h2 class="virtual-memory-title">VIRTUAL MEMORY</h2>
                <div class="memory-bars-container">
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </body>
</html>

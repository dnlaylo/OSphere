<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Storage Management Visualizer</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 {
            color: #d19a66;
            text-align: center;
            letter-spacing: 1.5px;
            margin-top: 0;
            text-transform: uppercase;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .input-group {
            margin-bottom: 15px;
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d19a66;
            color: #121212;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #e5ad7e;
        }
        #output-box {
            margin-top: 20px;
            background-color: #151515;
            border: 1px solid #2c2c2c;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        #result {
            font-size: 18px;
            font-weight: bold;
            color: #a3be8c;
            margin-bottom: 5px;
        }
        #sequence-display {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            word-break: break-all;
        }
        canvas {
            background-color: #151515;
            border-radius: 6px;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mass Storage Management</h2>
    
    <div class="input-group">
        <label for="sequence">Track Request Sequence (comma-separated):</label>
        <input type="text" id="sequence" value="98, 183, 37, 122, 14, 124, 65, 67">
    </div>
    
    <div class="row">
        <div class="input-group">
            <label for="initial">Current Track (Start):</label>
            <input type="number" id="initial" value="53">
        </div>
        <div class="input-group">
            <label for="maxTrack">Segment End Point (Max Track Index):</label>
            <input type="number" id="maxTrack" value="199">
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label for="algorithm">Scheduling Algorithm:</label>
            <select id="algorithm">
                <option value="FCFS">FCFS (First-Come, First-Served)</option>
                <option value="SSTF">SSTF (Shortest Seek Time First)</option>
                <option value="SCAN">SCAN (Elevator - Direction: Down)</option>
                <option value="CSCAN">C-SCAN (Circular SCAN - Direction: Up)</option>
            </select>
        </div>
    </div>

    <button onclick="processDiskScheduling()">Calculate & Graph</button>

    <div id="output-box">
        <div id="result">Total Head Movement: 0 tracks</div>
        <div id="sequence-display">Execution Path: None</div>
        <canvas id="graphCanvas" width="580" height="380"></canvas>
    </div>
</div>

<script>
function processDiskScheduling() {
    // 1. Gather User Inputs
    const initialHead = parseInt(document.getElementById('initial').value);
    const diskEnd = parseInt(document.getElementById('maxTrack').value);
    const algo = document.getElementById('algorithm').value;
    const rawInput = document.getElementById('sequence').value;
    
    let requests = rawInput.split(',')
                           .map(num => parseInt(num.trim()))
                           .filter(num => !isNaN(num) && num >= 0 && num <= diskEnd);

    if (isNaN(initialHead) || isNaN(diskEnd) || initialHead > diskEnd) {
        alert("Please ensure valid numbers. Current Track cannot exceed the Segment End Point.");
        return;
    }

    let fullPath = [];

    // 2. Compute path based on chosen Algorithm
    if (algo === 'FCFS') {
        fullPath = [initialHead, ...requests];
    } 
    else if (algo === 'SSTF') {
        fullPath = [initialHead];
        let remaining = [...requests];
        let current = initialHead;
        while (remaining.length > 0) {
            let closestIdx = 0;
            let minDistance = Math.abs(remaining[0] - current);
            for (let i = 1; i < remaining.length; i++) {
                let dist = Math.abs(remaining[i] - current);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestIdx = i;
                }
            }
            current = remaining[closestIdx];
            fullPath.push(current);
            remaining.splice(closestIdx, 1);
        }
    } 
    else if (algo === 'SCAN') {
        // Classic SCAN elevator going DOWN towards 0 first, then reversing up
        fullPath = [initialHead];
        let left = requests.filter(r => r < initialHead).sort((a,b) => b - a);
        let right = requests.filter(r => r >= initialHead).sort((a,b) => a - b);
        
        // Go down to 0 if there are elements below, or if algorithm demands wall hit
        fullPath.push(...left);
        if(left.length > 0 || initialHead > 0) fullPath.push(0); 
        fullPath.push(...right);
    } 
    else if (algo === 'CSCAN') {
        // C-SCAN going UP towards max segment wall, then jumping back to 0
        fullPath = [initialHead];
        let right = requests.filter(r => r >= initialHead).sort((a,b) => a - b);
        let left = requests.filter(r => r < initialHead).sort((a,b) => a - b);
        
        fullPath.push(...right);
        fullPath.push(diskEnd);
        fullPath.push(0); // Jump back to start segment boundary
        fullPath.push(...left);
    }

    // 3. Calculate Total Head Movement (ignoring non-seek structural jumps in C-SCAN if standard textbook formula applies)
    let totalMovement = 0;
    for (let i = 0; i < fullPath.length - 1; i++) {
        // Special rule for standard textbook C-SCAN: The jump from Max back to 0 doesn't count towards physical head movement
        if (algo === 'CSCAN' && fullPath[i] === diskEnd && fullPath[i+1] === 0) {
            continue; 
        }
        totalMovement += Math.abs(fullPath[i] - fullPath[i+1]);
    }

    // Update Text Data
    document.getElementById('result').innerText = `Total Head Movement: ${totalMovement} tracks`;
    document.getElementById('sequence-display').innerText = `Execution Path: ${fullPath.join(' → ')}`;

    // 4. Render the Graph
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const paddingX = 50;
    const paddingY = 40;
    const graphWidth = canvas.width - (paddingX * 2);
    const graphHeight = canvas.height - (paddingY * 2);
    const yStep = graphHeight / (fullPath.length - 1);

    // X axis calculation bounded firmly by user's explicitly defined End Point (0 to diskEnd)
    function getX(track) {
        return paddingX + (track / diskEnd) * graphWidth;
    }

    // Draw Top Segment boundary label line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.font = '10px sans-serif';
    ctx.fillStyle = '#888';
    ctx.fillText("0", paddingX, paddingY - 15);
    ctx.fillText(diskEnd.toString(), paddingX + graphWidth - 10, paddingY - 15);
    
    ctx.beginPath();
    ctx.moveTo(paddingX, paddingY - 5);
    ctx.lineTo(paddingX + graphWidth, paddingY - 5);
    ctx.stroke();

    // Reset styles for graph lines
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 1.5;

    // Draw Loop
    for (let i = 0; i < fullPath.length; i++) {
        const currentX = getX(fullPath[i]);
        const currentY = paddingY + (i * yStep);

        // Highlight head nodes
        ctx.fillStyle = (i === 0) ? '#d19a66' : '#ffffff';
        ctx.beginPath();
        ctx.arc(currentX, currentY, i === 0 ? 4 : 3, 0, 2 * Math.PI);
        ctx.fill();

        if (i < fullPath.length - 1) {
            const nextX = getX(fullPath[i+1]);
            const nextY = paddingY + ((i + 1) * yStep);

            ctx.beginPath();
            ctx.moveTo(currentX, currentY);
            ctx.lineTo(nextX, nextY);
            
            // Render C-SCAN wrap-around line as dashed to indicate a fast physical track reset
            if (algo === 'CSCAN' && fullPath[i] === diskEnd && fullPath[i+1] === 0) {
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = 'rgba(217, 83, 79, 0.4)'; // red dash line
            } else {
                ctx.setLineDash([]);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            }
            ctx.stroke();

            // Midpoint indicator arrow
            const midX = (currentX + nextX) / 2;
            const midY = (currentY + nextY) / 2;
            const angle = Math.atan2(nextY - currentY, nextX - currentX);
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(midX, midY);
            ctx.lineTo(midX - 6 * Math.cos(angle - Math.PI/6), midY - 6 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(midX - 6 * Math.cos(angle + Math.PI/6), midY - 6 * Math.sin(angle + Math.PI/6));
            ctx.fill();
        }
    }
    ctx.setLineDash([]); // clear dash state
}

// Initial draw sequence execution
processDiskScheduling();
</script>

</body>
</html>

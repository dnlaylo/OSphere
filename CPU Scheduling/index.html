<!DOCTYPE html>
<html lang="en">
  <head>
    <title>OSphere</title> 
    <meta property="og:title" content="OSphere" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />

    <style data-tag="reset-style-sheet">
      html { line-height: 1.15;} body { margin: 0;} * { box-sizing: border-box; border-width: 0; border-style: solid; -webkit-font-smoothing: antialiased;} p,li,ul,pre,div,h1,h2,h3,h4,h5,h6,figure,blockquote,figcaption { margin: 0; padding: 0;} button { background-color: transparent;} button,input,optgroup,select,textarea { font-family: inherit; font-size: 100%; line-height: 1.15; margin: 0;} button,select { text-transform: none;} button,[type="button"],[type="reset"],[type="submit"] { -webkit-appearance: button; appearance: button; color: inherit;} button::-moz-focus-inner,[type="button"]::-moz-focus-inner,[type="reset"]::-moz-focus-inner,[type="submit"]::-moz-focus-inner { border-style: none; padding: 0;} button:-moz-focus,[type="button"]:-moz-focus,[type="reset"]:-moz-focus,[type="submit"]:-moz-focus { outline: 1px dotted ButtonText;} a { color: inherit; text-decoration: inherit;} pre { white-space: normal;} input { padding: 2px 4px;} img { display: block;} details { display: block; margin: 0; padding: 0;} summary::-webkit-details-marker { display: none;} [data-thq="accordion"] [data-thq="accordion-content"] { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-in-out; padding: 0;} [data-thq="accordion"] details[data-thq="accordion-trigger"][open] + [data-thq="accordion-content"] { max-height: 1000vh;} details[data-thq="accordion-trigger"][open] summary [data-thq="accordion-icon"] { transform: rotate(180deg);} html { scroll-behavior: smooth }
    </style>
    <style data-tag="default-style-sheet">
      html { font-family: Inter; font-size: 16px; background-color: #000000; min-height: 100%; }
      body { font-weight: 400; font-style:normal; text-decoration: none; text-transform: none; letter-spacing: normal; line-height: 1.15; color: var(--dl-color-theme-neutral-dark); background: #000000 !important; fill: var(--dl-color-theme-neutral-dark); min-height: 100vh; width: 100%; overflow-x: hidden; }
      
      /* RESPONSIVENESS AND ANTI-WHITE SPACE PATCH */
      .algorithm-container1 { min-height: 100vh; background-color: #000000; width: 100%; display: flex; flex-direction: column; }
      .algorithm-thq-algorithm-elm { min-height: 100vh; width: 100%; position: relative; background-color: #000000; }
      .algorithm-thq-bg-elm { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
      .algorithm-thq-mainpageblackbg-elm { width: 100%; height: 100%; object-fit: cover; }
      
      #processTable { width: 100%; border-collapse: collapse; table-layout: fixed; }
      #processTable th, #processTable td { text-align: center; vertical-align: middle; width: 20%; word-wrap: break-word; }
      .top-controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
      @media (max-width: 768px) {
        .main-container { width: 95% !important; padding: 15px !important; margin: 20px auto !important; }
        #processTable input { width: 100% !important; max-width: 70px; }
      }
    </style>

    <link rel="stylesheet" href="https://unpkg.com/animate.css@4.1.1/animate.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" data-tag="font" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100;200;300;400;500;600;700;800;900&amp;display=swap" data-tag="font" />
    
    <link href="./index.css" rel="stylesheet" />
  </head>
  <body>
    <script src="./script.js" defer></script>
    
    <div>
      <div class="algorithm-container1">
        <div class="algorithm-thq-algorithm-elm">
          
          <div class="algorithm-thq-bg-elm">
            <img src="Assets/BG/Black BG.svg" alt="Solid black background" class="algorithm-thq-mainpageblackbg-elm" />
            <img src="Assets/BG/Dots.svg" alt="Dotted background pattern overlay" class="algorithm-thq-assets13-elm" />
          </div>
  
          <main class="algorithm-thq-content-container-elm" style="width: 100%; height: auto; padding-top: 120px; padding-bottom: 50px; left: 0; display: flex; justify-content: center; z-index: 10; position: relative;">
            <div class="main-container">
                <div class="top-controls">
                  <select id="algorithm">
                      <option value="" selected disabled>ALGORITHM</option>
                      <option value="FCFS">FCFS</option>
                      <option value="SJF">Shortest Job First (SJF)</option>
                      <option value="RR">Round Robin</option>
                      <option value="PRIORITY">Priority Scheduling</option>
                      <option value="HRRN">Highest Response Ratio Next (HRRN)</option>
                      <option value="MLQ">Multilevel Queue Scheduling</option>
                      <option value="MLFQ">Multilevel Feedback Queue (MLFQ)</option>
                  </select>
                    
                  <select id="mode" style="display:none;">
                      <option value="non" selected>Non-Preemptive</option>
                      <option value="pre">Preemptive</option>
                  </select>
                    
                  <div class="quantum-wrapper">
<div id="quantum-wrapper">
  <input type="number" id="quantum" placeholder="Time Quantum">

  <small id="mlfq-hint" class="quantum-hint">
    Q1 = q, Q2 = 2q, Q3 = FCFS
  </small>
</div>
</div>
                </div>
    
                <table id="processTable">
                    <thead>
                        <tr>
                            <th>Process</th>
                            <th>Arrival Time</th>
                            <th>Burst Time</th>
                            <th class="priority-col">Priority</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="pid">P1</td>
                            <td><input class="arrival" type="number" min="0"></td>
                            <td><input class="burst" type="number" min="1"></td>
                            <td class="priority-col"><input class="priority" type="number" min="1" value="1"></td>
                            <td><button class="delete">✕</button></td>
                        </tr>
                    </tbody>
                </table>
    
                <div class="buttons">
                    <button id="addProcess">+ Add Process</button>
                    <button id="compute">CALCULATE</button>
                </div>
            </div>
          </main>
  
          <nav class="algorithm-thq-navigation-bar-elm" style="z-index: 20;">
            <div class="nav-left-wrapper">
              <img src="Assets/NavBar/Side Menu.png" alt="Open side menu" class="algorithm-thq-side-menu-elm" />
              <a href="../Main Page/index.html">
                <img src="Assets/NavBar/Home (1).png" alt="Navigate to Home Page" class="algorithm-thq-home-elm" />
              </a>
            </div>
            <a href="../About Us/index.html" class="nav-right-help-link">
              <img src="Assets/NavBar/Help.png" alt="Navigate to Help Page" class="algorithm-thq-help-elm" />
            </a>
          </nav>
          
          <div id="popup-overlay">
            <div class="output-container1">
              <div class="output-thq-output-elm popup-content" style="height: auto; min-height: 523px; width: 100%; max-width: 900px; display: block;">
                <h2>Output Evaluation</h2>
                
                <h3>Gantt Chart Sequence</h3>
                <div id="gantt-blocks"></div>
                
                <h3>Data Calculations Table</h3>
                <table id="resultTable"></table>
                
                <h3>Averages Dashboard</h3>
                <div id="averages"></div>
              </div>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </body>
</html>
